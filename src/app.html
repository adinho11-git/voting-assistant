<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#C8102E" />
		<meta name="description" content="Interaktiver politischer Orientierungsassistent für Schweizer Abstimmungen und Parteien — KI-gestützte Briefings, Pro/Contra, Partei-Kompass, persönliches Voting-Journal." />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
		<link
			href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<script>
			// FOUC-free theme application
			try {
				var stored = localStorage.getItem('theme_v1');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var theme = stored === 'dark' || stored === 'light' ? stored : prefersDark ? 'dark' : 'light';
				document.documentElement.setAttribute('data-theme', theme);
			} catch (e) {
				document.documentElement.setAttribute('data-theme', 'light');
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
